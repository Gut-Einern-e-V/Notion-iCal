name: Create GitHub Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3)"
        required: true
      title:
        description: "Release title (optional)"
        required: false
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      generate_notes:
        description: "Auto-generate release notes"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tag exists (create and push if missing)
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          git fetch --tags --force

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
          else
            echo "Creating tag $TAG on current HEAD and pushing..."
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.title != '' && inputs.title || inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: ${{ inputs.generate_notes }}
