<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Notion-iCal</title>
  <style>
    :root { --bg: #f5f5f5; --card: #fff; --primary: #2f81f7; --text: #24292f; --muted: #656d76; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: var(--card); border: 1px solid #d0d7de; border-radius: 8px; padding: 2rem; width: 100%; max-width: 380px; }
    h1 { text-align: center; margin-bottom: 1.5rem; }
    .flash { padding: .75rem 1rem; border-radius: 6px; margin-bottom: 1rem; }
    .flash.error { background: #ffebe9; color: #82071e; }
    label { display: block; font-weight: 500; margin-bottom: .25rem; }
    input[type="password"] { width: 100%; padding: .5rem; border: 1px solid #d0d7de; border-radius: 6px; font-size: .875rem; }
    .btn { display: block; width: 100%; padding: .5rem 1rem; border-radius: 6px; border: 1px solid transparent; font-size: .875rem; cursor: pointer; font-weight: 500; margin-top: 1rem; }
    .btn-primary { background: var(--primary); color: #fff; }
  </style>
</head>
<body>
<div class="card">
  <h1>🔒 Notion-iCal</h1>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="flash {{ cat }}">{{ msg }}</div>
  {% endfor %}
  {% endwith %}

  <form method="post">
    <label for="password">Dashboard Password</label>
    <input type="password" id="password" name="password" placeholder="Enter password" required autofocus>
    <button class="btn btn-primary" type="submit">Log In</button>
  </form>
</div>
</body>
</html>
